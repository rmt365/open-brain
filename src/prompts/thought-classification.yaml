# Open Brain - Thought Classification Prompt
# Classifies raw thoughts and extracts structured metadata
# Used by classifier.ts via AI Gateway

version: "2.0"
service: "open-brain"
category: "classification"

system_prompts:
  default: |
    You are a thought classifier. Given a raw thought, extract structured metadata.
    Respond ONLY with valid JSON. No explanation, no markdown code blocks.

templates:
  classify_thought:
    description: "Classify a thought and extract metadata (type, life area, topics, people, actions, dates, sentiment)"
    variables:
      - thought_text
      - managed_topics
      - life_areas
      - life_area_definitions
    prompt: |
      Classify this thought and extract metadata:

      "{{thought_text}}"

      Return JSON with:
      {
        "thought_type": one of "note"|"idea"|"task"|"question"|"observation"|"decision"|"reference"|"reflection"|"expense"|"contract"|"maintenance"|"insurance"|"event"|"person",
        "life_area": one of {{life_areas}},
        "topics": ["topic1", "topic2"] (1-3 topics from the managed list below),
        "suggested_topics": ["new_topic"] (topics NOT in the managed list that you think should be added — empty array if none needed),
        "confidence": 0.0-1.0 (how confident you are in the classification),
        "people": ["person1", "person2"] (names of people mentioned),
        "action_items": ["action1", "action2"] (actionable tasks extracted from the text),
        "dates_mentioned": ["date1", "date2"] (any dates or time references),
        "sentiment": one of "positive"|"negative"|"neutral"|"mixed"
      }

      Life areas (pick the most appropriate one):
      {{life_area_definitions}}

      Managed topic list (pick from these when possible):
      {{managed_topics}}

      Guidelines:
      - "task": actionable items, TODOs, things to do
      - "question": queries, things to investigate or answer
      - "idea": creative concepts, proposals, possibilities
      - "decision": choices made, conclusions reached
      - "observation": things noticed, patterns seen
      - "reflection": introspective thoughts, lessons learned
      - "reference": links, citations, things to remember
      - "expense": receipts, bills, invoices, payments, purchases (e.g. "paid $45 electric bill", "dinner receipt", "car repair invoice")
      - "contract": leases, agreements, signed documents, terms (e.g. "signed lease", "rental agreement", "service contract")
      - "maintenance": repairs, service records, property info, paint colors, appliance history (e.g. "oil change", "painted living room", "furnace serviced")
      - "insurance": policies, pink slips, coverage documents, premiums (e.g. "car insurance renewal", "home policy", "travel insurance")
      - "event": things that happened on a specific date, appointments, occasions (e.g. "dentist appointment", "flew to Vancouver", "Emma's birthday party")
      - "person": information about a specific person — relationships, biographical details, contact info
      - "note": general notes that don't fit other categories
      - Topics should be lowercase, 1-3 words each
      - Pick topics from the managed list above when they fit
      - Only suggest a new topic in "suggested_topics" if the thought clearly doesn't fit any existing topic
      - People: extract names of people mentioned; empty array if none
      - Action items: extract concrete tasks or next steps; empty array if none
      - Dates mentioned: extract any dates, deadlines, or time references (e.g., "next Monday", "March 20", "end of Q2"); empty array if none
      - Sentiment: the overall emotional tone of the thought

models:
  default: "gpt-4o-mini"
  temperature: 0.3
  max_tokens: 500
