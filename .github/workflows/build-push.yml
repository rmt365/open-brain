name: Build and Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/rmt365/open-brain

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: brain
            dockerfile: docker/Dockerfile
          - name: mcp
            dockerfile: docker/Dockerfile.mcp
          - name: telegram
            dockerfile: docker/Dockerfile.telegram

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.name }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/open-brain

            # Pull latest images
            docker pull ghcr.io/rmt365/open-brain/brain:latest
            docker pull ghcr.io/rmt365/open-brain/mcp:latest

            # Restart all instances
            for env_file in deploy/instances/*.env; do
              [ -f "$env_file" ] || continue
              name=$(basename "$env_file" .env)
              echo "[deploy] Restarting $name..."
              docker compose -f deploy/docker-compose.instance.yml \
                --env-file "$env_file" \
                -p "$name" \
                up -d
            done

            echo "[deploy] Done"
