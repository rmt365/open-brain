name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type check
        run: deno check src/main.ts
      - name: Lint
        run: deno lint src/
      - name: Test
        run: deno test --allow-all src/tests/ || true
